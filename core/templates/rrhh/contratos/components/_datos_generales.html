<section class="contract-section">
    <h2>1. Datos Generales</h2>

    <table class="employee-table">
        <tbody>
            <tr>
                <th>Empleador</th>
                <td>{{ company.name }}</td>
            </tr>
            <tr>
                <th>NIT</th>
                <td>{{ company.nit }}</td>
            </tr>
            <tr>
                <th>Domicilio</th>
                <td>{{ company.address }}</td>
            </tr>
            {% for label, value in employee_rows %}
            <tr>
                <th>{{ label }}</th>
                <td>{{ value }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <p>{{ intro|safe }}</p>
</section>
