{% extends 'base.html' %}

{% block content %}

<h1 class="text-2xl font-bold mb-6">⚠️ Eliminar Empleado</h1>

<div class="bg-white p-6 rounded shadow">
    <p class="mb-4">
        ¿Seguro que deseas eliminar a <strong>{{ empleado.nombre_completo }}</strong>?
    </p>

    <form method="POST">
        {% csrf_token %}
        <button class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">
            Sí, eliminar
        </button>

        <a href="/rrhh/empleados/" class="ml-2 bg-gray-500 text-white px-4 py-2 rounded">
            Cancelar
        </a>
    </form>
</div>

{% endblock %}
