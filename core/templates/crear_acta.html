{% extends 'base.html' %}

{% block content %}

<h1 class="text-2xl font-bold mb-6">Crear Acta</h1>

<form method="POST" class="bg-white p-6 rounded shadow space-y-4">
    {% csrf_token %}

    <input type="text" name="numero_acta" placeholder="Número de acta" class="w-full border p-2 rounded" required>
    <input type="text" name="nombre_entidad" placeholder="Entidad" class="w-full border p-2 rounded" required>
    <input type="text" name="nit" placeholder="NIT" class="w-full border p-2 rounded" required>

    <input type="date" name="fecha" class="w-full border p-2 rounded" required>
    <input type="time" name="hora_inicio" class="w-full border p-2 rounded" required>

    <input type="text" name="lugar" placeholder="Lugar" class="w-full border p-2 rounded">

    <input type="text" name="presidente" placeholder="Presidente" class="w-full border p-2 rounded">
    <input type="text" name="secretario" placeholder="Secretario" class="w-full border p-2 rounded">

    <textarea name="orden_del_dia" placeholder="Orden del día" class="w-full border p-2 rounded"></textarea>
    <textarea name="desarrollo" placeholder="Desarrollo" class="w-full border p-2 rounded"></textarea>
    <textarea name="proposiciones" placeholder="Proposiciones" class="w-full border p-2 rounded"></textarea>

    <button class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
        Guardar
    </button>
</form>

{% endblock %}
