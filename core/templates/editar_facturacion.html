{% extends 'base.html' %}

{% block content %}

<div class="max-w-2xl mx-auto bg-white p-6 rounded shadow">

    <h1 class="text-2xl font-bold mb-6">✏️ Editar Facturación</h1>

    <form method="POST" class="space-y-4">
        {% csrf_token %}

        <div>
            <label class="block text-sm font-semibold mb-1">Proyecto</label>
            <select name="proyecto" class="w-full border rounded px-3 py-2">
                {% for p in proyectos %}
                <option value="{{ p.id }}" 
                    {% if p.id == seguimiento.proyecto.id %}selected{% endif %}>
                    {{ p.nombre }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="block text-sm font-semibold mb-1">Mes</label>
            <select name="mes" class="w-full border rounded px-3 py-2">
                {% for valor, label in seguimiento.MES_CHOICES %}
                <option value="{{ valor }}"
                    {% if seguimiento.mes == valor %}selected{% endif %}>
                    {{ label }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="block text-sm font-semibold mb-1">Año</label>
            <input type="number" name="anio" value="{{ seguimiento.anio }}" required
                class="w-full border rounded px-3 py-2">
        </div>

        <div>
            <label class="block text-sm font-semibold mb-1">Meta de Facturación</label>
            <input type="text" name="meta_facturacion" 
                value="{{ seguimiento.meta_facturacion }}" required
                class="w-full border rounded px-3 py-2">
        </div>

        <div>
            <label class="block text-sm font-semibold mb-1">Facturación Real</label>
            <input type="text" name="facturacion_real" 
                value="{{ seguimiento.facturacion_real }}" required
                class="w-full border rounded px-3 py-2">
        </div>

        <div class="flex gap-3 pt-2">
            <button type="submit"
                class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">
                Guardar cambios
            </button>
            <a href="/facturacion/"
                class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">
                Cancelar
            </a>
        </div>

    </form>
</div>

{% endblock %}
