{% extends 'base.html' %}

{% block content %}

<div class="max-w-7xl mx-auto px-4">

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-gray-800">👥 Empleados</h1>

        <a href="/rrhh/empleados/crear/" 
           class="bg-green-500 text-white px-4 py-2 rounded-lg shadow hover:bg-green-600 transition">
           + Agregar Empleado
        </a>
    </div>

    <div class="bg-white shadow-lg rounded-xl overflow-hidden bg-gray-100 text-gray-600">

        <table class="min-w-full text-sm text-gray-700">

            <!-- HEADER -->
            <thead class="bg-blue-600 text-white uppercase text-xs tracking-wider">
                <tr>
                    <th class="px-6 py-3 text-left">Nombre</th>
                    <th class="px-6 py-3 text-left">Documento</th>
                    <th class="px-6 py-3 text-left">Cargo</th>
                    <th class="px-6 py-3 text-left">Salario</th>
                </tr>
            </thead>

            <!-- BODY -->
            <tbody class="divide-y divide-gray-200">
                {% for e in empleados %}
                <tr class="hover:bg-gray-50 transition">
                    <td class="px-6 py-4 font-medium text-gray-900">
                        {{ e.nombre_completo }}
                    </td>
                    <td class="px-6 py-4">
                        {{ e.documento }}
                    </td>
                    <td class="px-6 py-4">
                        {{ e.cargo }}
                    </td>
                    <td class="px-6 py-4 font-semibold text-green-600">
                        ${{ e.salario }}
                    </td>
                </tr>
                {% endfor %}
            </tbody>

        </table>

    </div>

</div>

{% endblock %}
