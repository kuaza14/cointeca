{% extends 'base.html' %}

{% block content %}

<div class="max-w-xl mx-auto mt-10 bg-white p-6 rounded shadow text-center">

    <h2 class="text-2xl font-bold text-red-600 mb-4">
        ⚠️ Eliminar Acta
    </h2>

    <p class="mb-6 text-gray-700">
        ¿Seguro que quieres eliminar el acta 
        <strong>{{ acta.numero_acta }}</strong>?
    </p>

    <form method="POST">
        {% csrf_token %}

        <button class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">
            Sí, eliminar
        </button>

        <a href="/actas/{{ acta.id }}/" 
           class="ml-3 bg-gray-400 text-white px-4 py-2 rounded hover:bg-gray-500">
           Cancelar
        </a>
    </form>

</div>

{% endblock %}
