{% extends 'base.html' %}

{% block content %}

<div class="max-w-2xl mx-auto bg-white p-6 rounded shadow">

    <h1 class="text-2xl font-bold mb-2">📈 Registrar Seguimiento</h1>
    <p class="text-gray-500 mb-6">Indicador: <strong>{{ indicador.nombre }}</strong></p>

    <form method="POST" class="space-y-4">
        {% csrf_token %}

        <div>
            <label class="block text-sm font-semibold mb-1">Fecha</label>
            <input type="date" name="fecha" required
                class="w-full border rounded px-3 py-2">
        </div>

        <div>
            <label class="block text-sm font-semibold mb-1">Valor Obtenido</label>
            <input type="text" name="valor_obtenido" required
                placeholder="Ej: 28%"
                class="w-full border rounded px-3 py-2">
        </div>

        <div>
            <label class="block text-sm font-semibold mb-1">Observaciones</label>
            <textarea name="observaciones" rows="3"
                placeholder="Ej: Superó la meta del mes"
                class="w-full border rounded px-3 py-2"></textarea>
        </div>

        <div class="flex gap-3 pt-2">
            <button type="submit"
                class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">
                Guardar
            </button>
            <a href="/indicadores/{{ indicador.id }}/"
                class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">
                Cancelar
            </a>
        </div>

    </form>
</div>

{% endblock %}
